name: Deploy Workinkorea Development Server
on:
  push:
    branches: [dev]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-northeast3
  REPO_NAME: docker-repo
  IMAGE_NAME: workinkorea-server-dev

jobs:
  check-migration:
    runs-on: ubuntu-latest
    outputs:
      migration_changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Check alembic changes
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "alembic/versions/"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: check-migration
    runs-on: ubuntu-latest
    environment: development
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Build and Push Container
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev
          docker build \
            -f ${{ github.workspace }}/Dockerfile \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest \
            ${{ github.workspace }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Run Alembic Migration
        if: needs.check-migration.outputs.migration_changed == 'true'
        run: |
          gcloud run jobs delete alembic-migrate-dev --region ${{ env.REGION }} --quiet || true
          gcloud run jobs create alembic-migrate-dev \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --vpc-connector workinkorea-vpc-con \
            --vpc-egress all \
            --set-env-vars "DATABASE_SYNC_URL=${{ secrets.DATABASE_SYNC_URL }},DATABASE_ASYNC_URL=${{ secrets.DATABASE_ASYNC_URL }},DB_SCHEMA=${{ secrets.DB_SCHEMA }}" \
            --command uv \
            --args "run,alembic,upgrade,head"
          gcloud run jobs execute alembic-migrate-dev --region ${{ env.REGION }} --wait
          
      - name: Create environment variables file
        run: |
          cat > env.yaml << 'EOF'
          COOKIE_DOMAIN: "${{ secrets.COOKIE_DOMAIN }}"
          CLIENT_URL: "${{ secrets.CLIENT_URL }}"
          ORIGINS_URLS: "${{ secrets.ORIGINS_URLS }}"
          DATABASE_SYNC_URL: "${{ secrets.DATABASE_SYNC_URL }}"
          DATABASE_ASYNC_URL: "${{ secrets.DATABASE_ASYNC_URL }}"
          REDIS_HOST: "${{ secrets.REDIS_HOST }}"
          REDIS_PORT: "${{ secrets.REDIS_PORT }}"
          REDIS_DB: "${{ secrets.REDIS_DB }}"
          REDIS_PASSWORD: "${{ secrets.REDIS_PASSWORD }}"
          GOOGLE_CLIENT_ID: "${{ secrets.GOOGLE_CLIENT_ID }}"
          GOOGLE_CLIENT_SECRET: "${{ secrets.GOOGLE_CLIENT_SECRET }}"
          GOOGLE_REDIRECT_URI: "${{ secrets.GOOGLE_REDIRECT_URI }}"
          GOOGLE_AUTHORIZATION_URL: "${{ secrets.GOOGLE_AUTHORIZATION_URL }}"
          GOOGLE_TOKEN_URL: "${{ secrets.GOOGLE_TOKEN_URL }}"
          GOOGLE_USER_INFO_URL: "${{ secrets.GOOGLE_USER_INFO_URL }}"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"
          JWT_ALGORITHM: "${{ secrets.JWT_ALGORITHM }}"
          ACCESS_TOKEN_EXPIRE_MINUTES: "${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}"
          REFRESH_TOKEN_EXPIRE_MINUTES: "${{ secrets.REFRESH_TOKEN_EXPIRE_MINUTES }}"
          MAIL_USERNAME: "${{ secrets.MAIL_USERNAME }}"
          MAIL_PASSWORD: "${{ secrets.MAIL_PASSWORD }}"
          MAIL_FROM_NAME: "${{ secrets.MAIL_FROM_NAME }}"
          MAIL_FROM: "${{ secrets.MAIL_FROM }}"
          MAIL_PORT: "${{ secrets.MAIL_PORT }}"
          MAIL_SERVER: "${{ secrets.MAIL_SERVER }}"
          MINIO_ENDPOINT: "${{ secrets.MINIO_ENDPOINT }}"
          MINIO_ACCESS_KEY: "${{ secrets.MINIO_ACCESS_KEY }}"
          MINIO_SECRET_KEY: "${{ secrets.MINIO_SECRET_KEY }}"
          MINIO_BUCKET_NAME: "${{ secrets.MINIO_BUCKET_NAME }}"
          ADMIN_JWT_SECRET: "${{ secrets.ADMIN_JWT_SECRET }}"
          ADMIN_JWT_ALGORITHM: "${{ secrets.ADMIN_JWT_ALGORITHM }}"
          ADMIN_ACCESS_TOKEN_EXPIRE_MINUTES: "${{ secrets.ADMIN_ACCESS_TOKEN_EXPIRE_MINUTES }}"
          ADMIN_REFRESH_TOKEN_EXPIRE_MINUTES: "${{ secrets.ADMIN_REFRESH_TOKEN_EXPIRE_MINUTES }}"
          ADMIN_EMAILS: "${{ secrets.ADMIN_EMAILS }}"
          DB_SCHEMA: "${{ secrets.DB_SCHEMA }}"
          EOF

      - name: Deploy to Google Cloud Run
        run: |
          gcloud run deploy ${{ env.IMAGE_NAME }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --vpc-connector workinkorea-vpc-con \
            --vpc-egress all \
            --ingress internal-and-cloud-load-balancing \
            --allow-unauthenticated \
            --port 8000 \
            --env-vars-file env.yaml

      - name: Send Discord Deployment Notification
        if: always()
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK_URL_DEV }}
          status: ${{ job.status }}
          title: "Workinkorea-Server / Development"
          description: |
            **Deployment ${{ job.status == 'success' && 'Successful' || 'Failed' }}**
            
            • **Branch**: `${{ github.ref_name }}`
            • **Commit**: `${{ github.sha }}`
            • **Message**: ${{ github.event.head_commit.message }}
            • **Environment**: Development
            • **URL**: https://dev.workinkorea.net